data:
  format: jsonl
  train_path: data/rich_train.jsonl
  valid_path: data/rich_valid.jsonl
  test_path: data/rich_test.jsonl
  feature_schema_path: data/rich_feature_schema.json
  label_names: ["click", "convert"]
  max_features_per_sample: 80
  multi_hot_normalize: mean

loader:
  batch_size: 8

train:
  epochs: 3
  checkpoint_dir: checkpoints/mymodel
  export_after_train: true

export:
  export_dir: exports/mymodel

debug:
  tensorboard:
    log_dir: runs/model/mymodel

model:
  # deepfm: 兼容 libsvm 稀疏输入；mymodel: 使用结构化 input 模块 + SENet + MMOE。
  model_type: mymodel
  # num_features 为空时会从 train/valid/test 自动推断。padding ID 固定为 0。
  num_features:
  embedding_dim: 16
  task_names: ["click", "convert"]
  dnn_input_mode: "pool"  # pool 或 flatten
  dnn_hidden_units: [128, 64]
  activation: "relu"
  dropout: 0.1
  # DNN/MMOE/tower 中的归一化层：none、batchnorm、layernorm、rmsnorm。
  norm_type: "layernorm"
  use_batch_norm: false
  # 可选梯度截断位置，默认空列表。可选值包括：
  # embeddings、linear_terms、linear_logit、senet、rankmixer、self_attention、
  # feature_interaction、fm_vector、fm_logit、dnn_input、pepnet、lhuc、mmoe、deep_logit。
  stop_gradient: []

  # 多目标默认使用 MMOE；单目标可关闭。
  use_mmoe: true
  mmoe_num_experts: 4
  mmoe_expert_hidden_units: [128, 64]
  mmoe_expert_output_dim: 64
  tower_hidden_units: [64, 32]

  # 可选结构层。注意 SENet/RankMixer 需要固定 max_features_per_sample。
  use_senet: true
  use_lhuc: false
  use_pepnet: false
  use_rankmixer: false
  rankmixer_layers: 2
  rankmixer_token_dim: 64
  rankmixer_channel_dim: 128

  # 可选自注意力层。use_flash_attention=true 时走 PyTorch SDPA，满足条件会使用 flash kernel。
  use_self_attention: false
  attention_num_heads: 4
  use_flash_attention: false

  # mymodel 的输入模块配置。切换 model_type=mymodel 且 data.format=jsonl 后生效。
  input:
    # one-hot/multi-hot 支持 8 或 16 维；序列 DIN/attention 输出支持 16 或 32 维。
    one_hot_embedding_dim: 16
    multi_hot_embedding_dim: 16
    sequence_embedding_dim: 32
    sequence_attention_type: din  # din、attention 或 self_attention
    sequence_attention_num_heads: 4
    use_flash_attention: false
    # input 模块之后可接 SENet；开启后所有 field 会先投影到 senet_field_dim 再重标定并 flatten。
    use_senet: true
    senet_field_dim: 16
